name: Sync xivanalysis submodule

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SUBMODULE_BOT_TOKEN }}
          submodules: true

      - name: Initialize submodules
        run: git submodule update --init --recursive

      - name: Update xivanalysis to main
        run: |
          set -e
          cd external/xivanalysis
          git checkout main
          git pull --ff-only origin main

      - name: Commit submodule bump
        id: commit
        run: |
          set -e
          git add external/xivanalysis
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git config user.name "xivanalysis-bot"
            git config user.email "bot@users.noreply.github.com"
            git commit -m "chore: bump xivanalysis submodule"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Push changes
        if: steps.commit.outputs.changed == 'true'
        run: git push origin HEAD
